<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZETA × MAX | Подключение</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0f1f, #111827);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 360px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .logos {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .logos img {
      height: 36px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 25px;
    }

    .status {
      font-size: 15px;
      margin-bottom: 20px;
    }

    .progress {
      height: 6px;
      width: 100%;
      background: #020617;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      animation: load 3s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    .footer {
      font-size: 11px;
      color: #6b7280;
      margin-top: 10px;
    }

    .badge {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 5px;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="logos">
    <img src="max.png">
    <img src="zeta.png">
  </div>

  <div class="title">ZETA × MAX</div>
  <div class="subtitle">Secure Access • ZETA GBHT System</div>

  <div class="status">Подключение к корпоративному порталу MAX...</div>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="footer">
    © 2026 ZETA GBHT Corporation
  </div>

  <div class="badge">
    Internal System • MAX Panel v4.2
  </div>

</div>

<script>
  setTimeout(() => {
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }, 3200);
</script>

</body>
</html>
